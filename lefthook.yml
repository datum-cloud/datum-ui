pre-commit:
  parallel: true
  commands:
    eslint:
      root: packages/datum-ui/
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm exec eslint {staged_files} --fix
      auto_add: true
    typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm -F @datum-cloud/datum-ui typecheck
    storybook-eslint:
      root: apps/storybook/
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm exec eslint {staged_files} --fix
      auto_add: true
    storybook-typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm -F storybook typecheck
