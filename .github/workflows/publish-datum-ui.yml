name: Publish datum-ui

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # Skip the bot commit that this workflow itself creates when bumping the
    # version. The committer name for GITHUB_TOKEN pushes is "github-actions[bot]".
    if: github.actor != 'github-actions[bot]'
    outputs:
      datum-ui: ${{ steps.filter.outputs.datum-ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            datum-ui:
              - 'packages/datum-ui/**'

  publish:
    name: Publish to npm
    needs: changes
    if: needs.changes.outputs.datum-ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the version bump commit and tag
      id-token: write  # needed for npm trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version bump type from PR labels
        id: bump-type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that was merged into this commit and read its labels.
          # Falls back to "patch" if no relevant label is found.
          PR_LABELS=$(gh pr list \
            --state merged \
            --base main \
            --search "${{ github.sha }}" \
            --json labels \
            --jq '.[0].labels[].name' 2>/dev/null || true)

          if echo "$PR_LABELS" | grep -q "release:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "release:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git for version bump commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create git tag
        id: version
        working-directory: packages/datum-ui
        run: |
          # npm version edits package.json, commits, and creates a tag.
          # --no-git-tag-version is NOT set so the tag is created here.
          NEW_VERSION=$(npm version ${{ steps.bump-type.outputs.type }} \
            --message "chore: release @datum-cloud/datum-ui v%s [skip ci]")
          echo "new-version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push version bump commit and tag
        run: |
          git push origin main --follow-tags

      - name: Build datum-ui
        run: pnpm --filter @datum-cloud/datum-ui build

      - name: Publish to npm
        working-directory: packages/datum-ui
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Summary
        run: |
          echo "### Published ${{ steps.version.outputs.new-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: \`@datum-cloud/datum-ui\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry: https://www.npmjs.com/package/@datum-cloud/datum-ui" >> "$GITHUB_STEP_SUMMARY"
